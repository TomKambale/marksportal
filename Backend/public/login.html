<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | Marks Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        :root {
            --primary-green: #006400;
            --secondary-green: #228B22;
            --light-green: #f0f9f0;
            --dark-green: #004d00;
            --accent-gold: #D4AF37;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --medium-gray: #6c757d;
            --dark-gray: #343a40;
            --transition: all 0.3s ease;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --danger: #dc3545;
            --warning: #fd7e14;
            --info: #0dcaf0;
        }

        body {
            background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: var(--white);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
        }

        .imgcontainer {
            text-align: center;
            padding: 2rem 2rem 1rem 2rem;
            background: linear-gradient(135deg, var(--light-green), var(--white));
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-gold);
            padding: 8px;
            background: var(--white);
        }

        /* Fallback if image doesn't load */
        .avatar[src="security.png"] {
            content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23006400"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>');
            width: 80px;
            height: 80px;
            background: var(--light-green);
        }

        h2 {
            text-align: center;
            color: var(--dark-green);
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            padding: 0 2rem;
        }

        .login-form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--dark-green);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="pfnumber"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--white);
        }

        input[type="text"]:focus,
        input[type="pfnumber"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(0, 100, 0, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-green);
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }

        button[type="submit"] {
            width: 100%;
            background: var(--primary-green);
            color: var(--white);
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1rem;
        }

        button[type="submit"]:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
        }

        .cancelbtn {
            background: var(--light-gray);
            color: var(--dark-gray);
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .cancelbtn:hover {
            background: var(--medium-gray);
            color: var(--white);
            transform: translateY(-2px);
        }

        .psw {
            font-size: 0.9rem;
        }

        .psw a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .psw a:hover {
            color: var(--accent-gold);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 1rem;
            }
            
            .login-form {
                padding: 1.5rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 1rem;
            }
            
            .cancelbtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="imgcontainer">
            <img src="security.png" alt="Avatar" class="avatar" onerror="this.style.display='none'">
        </div>
        
        <h2>Welcome Back</h2>
        
        <form action="/login.js" method="post" class="login-form">
            <div class="form-group">
                <label for="uname">Email</label>
                <input type="text" placeholder="Enter Email" name="uname" id="uname" required>
            </div>

            <div class="form-group">
                <label for="pf">PF Number</label>
                <input type="text" placeholder="Enter PF Number" name="pf" id="pf" required>
            </div>

            <div class="form-group">
                <label for="psw">Password</label>
                <input type="password" placeholder="Enter Password" name="psw" id="psw" required>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" checked="checked" name="remember" id="remember">
                <label for="remember">Remember me</label>
            </div>
            
            <button type="submit">Login</button>
            
            <div class="action-buttons">
                <button type="button" class="cancelbtn">Cancel</button>
                <span class="psw">Forgot <a href="#">password?</a></span>
            </div>
        </form>
    </div>
</body>
</html>
