<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.jpg">
    <title>Register | Marks Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        :root {
            --primary-green: #006400;
            --secondary-green: #228B22;
            --light-green: #f0f9f0;
            --dark-green: #004d00;
            --accent-gold: #D4AF37;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --medium-gray: #6c757d;
            --dark-gray: #343a40;
            --transition: all 0.3s ease;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --danger: #dc3545;
            --success: #28a745;
        }

        body {
            background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .register-container {
            max-width: 500px;
            width: 100%;
            background: var(--white);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .imgcontainer {
            text-align: center;
            padding: 2rem 2rem 1rem 2rem;
            background: linear-gradient(135deg, var(--light-green), var(--white));
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-gold);
            padding: 8px;
            background: var(--white);
        }

        h2 {
            text-align: center;
            color: var(--dark-green);
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            padding: 0 2rem;
        }

        .register-form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--dark-green);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(0, 100, 0, 0.1);
        }

        input.error {
            border-color: var(--danger);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .info-text {
            font-size: 0.7rem;
            color: var(--medium-gray);
            margin-top: 0.25rem;
        }

        button[type="submit"] {
            width: 100%;
            background: var(--primary-green);
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1rem;
        }

        button[type="submit"]:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        button[type="submit"]:disabled {
            background: var(--medium-gray);
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
        }

        .login-link a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            color: var(--accent-gold);
        }

        .alert {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: var(--success);
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: var(--danger);
            border: 1px solid #f5c6cb;
        }

        .alert.show {
            display: block;
        }

        @media (max-width: 480px) {
            .register-container {
                margin: 1rem;
            }
            .register-form {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="imgcontainer">
            <img src="security.png" alt="Avatar" class="avatar" onerror="this.style.display='none'">
        </div>
        
        <h2>Create Account</h2>
        
        <div class="register-form">
            <div id="alert" class="alert"></div>
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" placeholder="Enter your full name" name="name" id="name" required>
                <div class="error-message" id="nameError">Please enter your full name</div>
            </div>

            <div class="form-group">
                <label for="uname">Email Address</label>
                <input type="email" placeholder="name@ttu.ac.ke" name="uname" id="uname" required>
                <div class="error-message" id="emailError">Must be a valid @ttu.ac.ke email address</div>
                <div class="info-text">Only @ttu.ac.ke email addresses are allowed</div>
            </div>

            <div class="form-group">
                <label for="pf">PF Number</label>
                <input type="text" placeholder="Enter PF Number e.g TTU0987" name="pf" id="pf" required>
                <div class="error-message" id="pfError">Please enter your PF number</div>
            </div>

            <div class="form-group">
                <label for="psw">Password</label>
                <input type="password" placeholder="Create a password" name="psw" id="psw" required>
                <div class="error-message" id="passwordError">Password must be at least 6 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPsw">Confirm Password</label>
                <input type="password" placeholder="Confirm your password" name="confirmPsw" id="confirmPsw" required>
                <div class="error-message" id="confirmError">Passwords do not match</div>
            </div>
            
            <button type="submit" id="registerBtn">Register</button>
            
            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const registerBtn = document.getElementById('registerBtn');
        const alertDiv = document.getElementById('alert');

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        function validateEmail(email) {
            const ttuEmailRegex = /^[a-zA-Z0-9._%+-]+@ttu\.ac\.ke$/;
            return ttuEmailRegex.test(email);
        }

        function validateForm() {
            let isValid = true;
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('uname').value.trim();
            const pf = document.getElementById('pf').value.trim();
            const password = document.getElementById('psw').value;
            const confirmPassword = document.getElementById('confirmPsw').value;

            // Validate name
            if (!name) {
                document.getElementById('nameError').classList.add('show');
                document.getElementById('name').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('nameError').classList.remove('show');
                document.getElementById('name').classList.remove('error');
            }

            // Validate email
            if (!email || !validateEmail(email)) {
                document.getElementById('emailError').classList.add('show');
                document.getElementById('uname').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('emailError').classList.remove('show');
                document.getElementById('uname').classList.remove('error');
            }

            // Validate PF
            if (!pf) {
                document.getElementById('pfError').classList.add('show');
                document.getElementById('pf').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('pfError').classList.remove('show');
                document.getElementById('pf').classList.remove('error');
            }

            // Validate password
            if (!password || password.length < 6) {
                document.getElementById('passwordError').classList.add('show');
                document.getElementById('psw').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('passwordError').classList.remove('show');
                document.getElementById('psw').classList.remove('error');
            }

            // Validate confirm password
            if (password !== confirmPassword) {
                document.getElementById('confirmError').classList.add('show');
                document.getElementById('confirmPsw').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('confirmError').classList.remove('show');
                document.getElementById('confirmPsw').classList.remove('error');
            }

            return isValid;
        }

        registerBtn.addEventListener('click', async () => {
            if (!validateForm()) {
                return;
            }

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('uname').value.trim();
            const pf = document.getElementById('pf').value.trim();
            const password = document.getElementById('psw').value;

            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        uname: email,
                        pf: pf,
                        psw: password
                    })
                });

                const data = await response.text();
                const isJson = response.headers.get('content-type')?.includes('application/json');
                const result = isJson ? JSON.parse(data) : { message: data };

                if (response.ok) {
                    showAlert('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert(result.error || result.message || 'Registration failed', 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Register';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Network error. Please try again.', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register';
            }
        });

        // Real-time validation
        document.getElementById('uname').addEventListener('input', function() {
            if (this.value && !validateEmail(this.value)) {
                document.getElementById('emailError').classList.add('show');
                this.classList.add('error');
            } else {
                document.getElementById('emailError').classList.remove('show');
                this.classList.remove('error');
            }
        });

        document.getElementById('confirmPsw').addEventListener('input', function() {
            const password = document.getElementById('psw').value;
            if (this.value !== password) {
                document.getElementById('confirmError').classList.add('show');
                this.classList.add('error');
            } else {
                document.getElementById('confirmError').classList.remove('show');
                this.classList.remove('error');
            }
        });
    </script>
</body>
</html>
