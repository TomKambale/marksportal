<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/security.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/security.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/security.png">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>Admin Panel | User Management</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
      }

      :root {
        --primary-green: #006400;
        --secondary-green: #228b22;
        --light-green: #f0f9f0;
        --dark-green: #004d00;
        --accent-gold: #d4af37;
        --white: #ffffff;
        --light-gray: #f8f9fa;
        --medium-gray: #6c757d;
        --dark-gray: #343a40;
        --transition: all 0.3s ease;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        --danger: #dc3545;
        --warning: #fd7e14;
        --success: #28a745;
        --info: #0dcaf0;
      }

      body {
        background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
        min-height: 100vh;
        padding: 2rem 1.5rem;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .logout-btn,
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--white);
        border: none;
        padding: 0.6rem 1.2rem;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: var(--shadow);
        text-decoration: none;
      }

      .logout-btn {
        color: var(--danger);
      }

      .logout-btn:hover {
        background: var(--danger);
        color: var(--white);
        transform: translateY(-2px);
      }

      .back-btn {
        color: var(--primary-green);
      }

      .back-btn:hover {
        background: var(--light-green);
        transform: translateX(-4px);
      }

      .header {
        margin-bottom: 2rem;
        text-align: center;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--secondary-green)
        );
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }

      .stats-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .stat-card {
        background: var(--white);
        border-radius: 20px;
        padding: 1rem 1.5rem;
        flex: 1;
        min-width: 150px;
        box-shadow: var(--shadow);
        text-align: center;
      }

      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary-green);
      }

      .stat-label {
        font-size: 0.75rem;
        color: var(--medium-gray);
      }

      .card {
        background: var(--white);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(0, 100, 0, 0.1);
      }

      .card-header {
        background: var(--dark-green);
        color: white;
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .card-header h2 {
        font-size: 1.25rem;
        font-weight: 600;
      }

      .add-user-btn {
        background: var(--accent-gold);
        color: var(--dark-green);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
      }

      .add-user-btn:hover {
        transform: translateY(-2px);
        background: var(--primary-green);
        color: white;
      }

      .reset-pwd-btn {
        background: var(--warning);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        margin-left: 0.5rem;
      }

      .reset-pwd-btn:hover {
        transform: translateY(-2px);
        background: #e66a00;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      .users-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .users-table th {
        background: var(--light-gray);
        color: var(--dark-gray);
        padding: 1rem;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid var(--light-green);
      }

      .users-table td {
        padding: 1rem;
        border-bottom: 1px solid var(--light-gray);
        color: var(--dark-gray);
      }

      .users-table tr:hover {
        background: var(--light-green);
      }

      .role-badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 600;
      }

      .role-admin {
        background: #cce5ff;
        color: #004085;
      }

      .role-lecturer {
        background: #d4edda;
        color: #155724;
      }

      .role-user {
        background: #e2e3e5;
        color: #383d41;
      }

      .status-badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 600;
      }

      .status-active {
        background: #d4edda;
        color: #155724;
      }

      .status-inactive {
        background: #fff3cd;
        color: #856404;
      }

      .status-suspended {
        background: #f8d7da;
        color: #721c24;
      }

      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.1rem;
        margin: 0 0.25rem;
        padding: 0.25rem;
        transition: var(--transition);
      }

      .edit-btn {
        color: var(--info);
      }

      .edit-btn:hover {
        color: #0b5ed7;
        transform: scale(1.1);
      }

      .delete-btn {
        color: var(--danger);
      }

      .delete-btn:hover {
        color: #c82333;
        transform: scale(1.1);
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      .modal-content {
        background-color: var(--white);
        margin: 5% auto;
        padding: 2rem;
        border-radius: 24px;
        width: 90%;
        max-width: 500px;
        box-shadow: var(--shadow);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .modal-header h3 {
        color: var(--dark-green);
      }

      .close {
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--medium-gray);
      }

      .close:hover {
        color: var(--danger);
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        font-weight: 600;
        color: var(--dark-green);
        margin-bottom: 0.5rem;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.6rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.9rem;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--primary-green);
      }

      .submit-btn {
        background: var(--primary-green);
        color: white;
        border: none;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 1rem;
      }

      .submit-btn:hover {
        background: var(--dark-green);
      }

      .search-box {
        padding: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        width: 250px;
      }

      .password-strength {
        margin-top: 0.25rem;
        font-size: 0.75rem;
      }

      .strength-weak {
        color: var(--danger);
      }
      .strength-medium {
        color: var(--warning);
      }
      .strength-strong {
        color: var(--success);
      }

      @media (max-width: 768px) {
        body {
          padding: 1rem;
        }
        .users-table th,
        .users-table td {
          padding: 0.5rem;
          font-size: 0.7rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top-bar">
        <button
          class="back-btn"
          onclick="window.location.href = 'semesters.html'"
        >
          ← Dashboard
        </button>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
      </div>

      <div class="header">
        <h1>Admin Panel</h1>
        <p>Manage system users and permissions</p>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number" id="totalUsers">0</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="totalAdmins">0</div>
          <div class="stat-label">Admins</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="totalLecturers">0</div>
          <div class="stat-label">Lecturers</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="activeUsers">0</div>
          <div class="stat-label">Active Users</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fa-solid fa-users"></i> System Users</h2>
          <div style="display: flex; gap: 1rem">
            <input
              type="text"
              id="searchInput"
              class="search-box"
              placeholder="Search users..."
              onkeyup="searchUsers()"
            />
            <button class="add-user-btn" onclick="openAddUserModal()">
              + Add New User
            </button>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="users-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Email</th>
                <th>PF Number</th>
                <th>Full Name</th>
                <th>Role</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="8" style="text-align: center">Loading users...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="userModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Add New User</h3>
          <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <form id="userForm">
          <input type="hidden" id="userId" />
          <div class="form-group">
            <label>Email (must be @ttu.ac.ke)</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label>PF Number</label>
            <input type="text" id="pfNumber" required />
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              onkeyup="checkPasswordStrength()"
            />
            <div id="passwordStrength" class="password-strength"></div>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="status">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="suspended">Suspended</option>
            </select>
          </div>
          <button type="submit" class="submit-btn">Save User</button>
        </form>
      </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetPasswordModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Reset User Password</h3>
          <span class="close" onclick="closeResetPasswordModal()">&times;</span>
        </div>
        <form id="resetPasswordForm">
          <input type="hidden" id="resetUserId" />
          <div class="form-group">
            <label>User</label>
            <input
              type="text"
              id="resetUserName"
              readonly
              style="background: #f5f5f5"
            />
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input
              type="password"
              id="newPassword"
              required
              onkeyup="checkResetPasswordStrength()"
            />
            <div id="resetPasswordStrength" class="password-strength"></div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" required />
          </div>
          <button type="submit" class="submit-btn">Reset Password</button>
        </form>
      </div>
    </div>

    <script>
      let currentUserRole = null;
      let allUsers = [];

      // Check if user is admin
      async function checkAdminAccess() {
        try {
          const response = await fetch("/api/current-user", {
            credentials: "include",
          });
          const data = await response.json();

          if (data.success && data.user) {
            const roleResponse = await fetch(
              `/api/user-role/${data.user.email}`,
            );
            const roleData = await roleResponse.json();

            if (roleData.role !== "admin") {
              alert("Access denied. Admin privileges required.");
              window.location.href = "semesters.html";
              return false;
            }
            currentUserRole = roleData.role;
            return true;
          } else {
            window.location.href = "login.html";
            return false;
          }
        } catch (error) {
          console.error("Admin check error:", error);
          window.location.href = "login.html";
          return false;
        }
      }

      // Fetch all users
      async function fetchUsers() {
        try {
          const response = await fetch("/api/admin/users", {
            credentials: "include",
          });
          const data = await response.json();

          if (data.success) {
            allUsers = data.users;
            renderUsers(allUsers);
            updateStats(allUsers);
          } else {
            throw new Error(data.error);
          }
        } catch (error) {
          console.error("Error fetching users:", error);
          document.getElementById("usersTableBody").innerHTML =
            `<tr><td colspan="8" style="text-align: center; color: red;">Error loading users: ${error.message}</td></tr>`;
        }
      }

      // Render users table
      function renderUsers(users) {
        const tbody = document.getElementById("usersTableBody");

        if (!users || users.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="8" style="text-align: center;">No users found</td></tr>';
          return;
        }

        tbody.innerHTML = users
          .map(
            (user) => `
            <tr>
                <td>${user.id}</td>
                <td>${escapeHtml(user.email)}</td>
                <td>${escapeHtml(user.pf_number)}</td>
                <td>${escapeHtml(user.full_name)}</td>
                <td><span class="role-badge role-${user.role}">${user.role.toUpperCase()}</span></td>
                <td><span class="status-badge status-${user.status}">${user.status.toUpperCase()}</span></td>
                <td>${new Date(user.created_at).toLocaleDateString()}</td>
                <td>
    <button class="action-btn edit-btn" onclick="editUser(${user.id})" title="Edit User">
        <i class="fa-solid fa-user-pen"></i>
    </button>
    <button class="action-btn" onclick="openResetPasswordModal(${user.id})" title="Reset Password">
        <i class="fa-solid fa-user-lock"></i>
    </button>
    <button class="action-btn delete-btn" onclick="deleteUser(${user.id})" title="Delete User">
        <i class="fa-solid fa-trash-can"></i>
    </button>
</td>
            </tr>
        `,
          )
          .join("");
      }

      // Update statistics
      function updateStats(users) {
        const total = users.length;
        const admins = users.filter((u) => u.role === "admin").length;
        const lecturers = users.filter((u) => u.role === "lecturer").length;
        const active = users.filter((u) => u.status === "active").length;

        document.getElementById("totalUsers").textContent = total;
        document.getElementById("totalAdmins").textContent = admins;
        document.getElementById("totalLecturers").textContent = lecturers;
        document.getElementById("activeUsers").textContent = active;
      }

      // Search users
      function searchUsers() {
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filtered = allUsers.filter(
          (user) =>
            user.email.toLowerCase().includes(searchTerm) ||
            user.full_name.toLowerCase().includes(searchTerm) ||
            user.pf_number.toLowerCase().includes(searchTerm),
        );
        renderUsers(filtered);
      }

      // Open add user modal
      function openAddUserModal() {
        document.getElementById("modalTitle").textContent = "Add New User";
        document.getElementById("userForm").reset();
        document.getElementById("userId").value = "";
        document.getElementById("password").required = true;
        document.getElementById("passwordStrength").innerHTML = "";
        document.getElementById("userModal").style.display = "block";
      }

      // Edit user
      async function editUser(id) {
        const user = allUsers.find((u) => u.id === id);
        if (!user) return;

        document.getElementById("modalTitle").textContent = "Edit User";
        document.getElementById("userId").value = user.id;
        document.getElementById("email").value = user.email;
        document.getElementById("pfNumber").value = user.pf_number;
        document.getElementById("fullName").value = user.full_name;
        document.getElementById("role").value = user.role;
        document.getElementById("status").value = user.status;
        document.getElementById("password").value = "";
        document.getElementById("password").required = false;
        document.getElementById("passwordStrength").innerHTML = "";
        document.getElementById("userModal").style.display = "block";
      }

      // Open reset password modal
      function openResetPasswordModal(id) {
        const user = allUsers.find((u) => u.id === id);
        if (!user) return;

        document.getElementById("resetUserId").value = user.id;
        document.getElementById("resetUserName").value =
          `${user.full_name} (${user.email})`;
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";
        document.getElementById("resetPasswordStrength").innerHTML = "";
        document.getElementById("resetPasswordModal").style.display = "block";
      }

      // Check password strength for main form
      function checkPasswordStrength() {
        const password = document.getElementById("password").value;
        const strengthDiv = document.getElementById("passwordStrength");

        if (!password) {
          strengthDiv.innerHTML = "";
          return;
        }

        let strength = 0;
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]+/)) strength++;
        if (password.match(/[A-Z]+/)) strength++;
        if (password.match(/[0-9]+/)) strength++;
        if (password.match(/[$@#&!]+/)) strength++;

        let strengthText = "";
        let strengthClass = "";

        if (strength <= 2) {
          strengthText = "Weak";
          strengthClass = "strength-weak";
        } else if (strength <= 4) {
          strengthText = "Medium";
          strengthClass = "strength-medium";
        } else {
          strengthText = "Strong";
          strengthClass = "strength-strong";
        }

        strengthDiv.innerHTML = `<span class="${strengthClass}">Password strength: ${strengthText}</span>`;
      }

      // Check password strength for reset modal
      function checkResetPasswordStrength() {
        const password = document.getElementById("newPassword").value;
        const strengthDiv = document.getElementById("resetPasswordStrength");

        if (!password) {
          strengthDiv.innerHTML = "";
          return;
        }

        let strength = 0;
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]+/)) strength++;
        if (password.match(/[A-Z]+/)) strength++;
        if (password.match(/[0-9]+/)) strength++;
        if (password.match(/[$@#&!]+/)) strength++;

        let strengthText = "";
        let strengthClass = "";

        if (strength <= 2) {
          strengthText = "Weak";
          strengthClass = "strength-weak";
        } else if (strength <= 4) {
          strengthText = "Medium";
          strengthClass = "strength-medium";
        } else {
          strengthText = "Strong";
          strengthClass = "strength-strong";
        }

        strengthDiv.innerHTML = `<span class="${strengthClass}">Password strength: ${strengthText}</span>`;
      }

      // Delete user
      async function deleteUser(id) {
        const user = allUsers.find((u) => u.id === id);
        if (
          !confirm(
            `Are you sure you want to delete user "${user.full_name}"? This action cannot be undone.`,
          )
        )
          return;

        try {
          const response = await fetch(`/api/admin/users/${id}`, {
            method: "DELETE",
            credentials: "include",
          });
          const data = await response.json();

          if (data.success) {
            alert("User deleted successfully");
            fetchUsers();
          } else {
            throw new Error(data.error);
          }
        } catch (error) {
          console.error("Error deleting user:", error);
          alert("Error deleting user: " + error.message);
        }
      }

      // Close modals
      function closeModal() {
        document.getElementById("userModal").style.display = "none";
      }

      function closeResetPasswordModal() {
        document.getElementById("resetPasswordModal").style.display = "none";
      }

      // Handle main form submission (Add/Edit User)
      document
        .getElementById("userForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const userId = document.getElementById("userId").value;
          const password = document.getElementById("password").value;

          // For new users, password is required
          if (!userId && !password) {
            alert("Password is required for new users");
            return;
          }

          const userData = {
            email: document.getElementById("email").value,
            pf_number: document.getElementById("pfNumber").value,
            full_name: document.getElementById("fullName").value,
            role: document.getElementById("role").value,
            status: document.getElementById("status").value,
          };

          // Only include password if provided
          if (password) {
            userData.password = password;
          }

          // Validate email domain
          if (!userData.email.endsWith("@ttu.ac.ke")) {
            alert("Email must be from @ttu.ac.ke domain");
            return;
          }

          try {
            const url = userId
              ? `/api/admin/users/${userId}`
              : "/api/admin/users";
            const method = userId ? "PUT" : "POST";

            const response = await fetch(url, {
              method: method,
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(userData),
            });
            const data = await response.json();

            if (data.success) {
              alert(
                userId
                  ? "User updated successfully"
                  : "User created successfully",
              );
              closeModal();
              fetchUsers();
            } else {
              throw new Error(data.error);
            }
          } catch (error) {
            console.error("Error saving user:", error);
            alert("Error saving user: " + error.message);
          }
        });

      // Handle reset password form submission
      document
        .getElementById("resetPasswordForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const userId = document.getElementById("resetUserId").value;
          const newPassword = document.getElementById("newPassword").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          // Validate passwords
          if (newPassword !== confirmPassword) {
            alert("Passwords do not match");
            return;
          }

          if (newPassword.length < 6) {
            alert("Password must be at least 6 characters long");
            return;
          }

          try {
            const response = await fetch(
              `/api/admin/users/${userId}/reset-password`,
              {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: newPassword }),
              },
            );
            const data = await response.json();

            if (data.success) {
              alert("Password reset successfully");
              closeResetPasswordModal();
            } else {
              throw new Error(data.error);
            }
          } catch (error) {
            console.error("Error resetting password:", error);
            alert("Error resetting password: " + error.message);
          }
        });

      // Logout function
      async function logout() {
        try {
          await fetch("/api/logout", {
            method: "POST",
            credentials: "include",
          });
          localStorage.clear();
          window.location.href = "login.html";
        } catch (error) {
          localStorage.clear();
          window.location.href = "login.html";
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // Initialize page
      async function init() {
        const isAdmin = await checkAdminAccess();
        if (isAdmin) {
          await fetchUsers();
        }
      }

      init();
    </script>
  </body>
</html>
