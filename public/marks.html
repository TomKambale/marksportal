<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.jpg">
    <title>Student Marks | Lecturer Dashboard</title>
    <style>
        
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
      }

      :root {
        --primary-green: #006400;
        --secondary-green: #228b22;
        --light-green: #f0f9f0;
        --dark-green: #004d00;
        --accent-gold: #d4af37;
        --white: #ffffff;
        --light-gray: #f8f9fa;
        --medium-gray: #6c757d;
        --dark-gray: #343a40;
        --transition: all 0.3s ease;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        --danger: #dc3545;
        --warning: #fd7e14;
        --info: #0dcaf0;
      }

      body {
        background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
        min-height: 100vh;
        padding: 2rem 1.5rem;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .header {
        margin-bottom: 2rem;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--white);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
        color: var(--primary-green);
        margin-bottom: 1rem;
        box-shadow: var(--shadow);
      }
      .upload-btn {
        float: right;
        align-items: center;
        gap: 0.5rem;
        background: var(--white);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
        color: var(--primary-green);
        box-shadow: var(--shadow);
      }

      .back-btn:hover {
        background: var(--light-green);
        transform: translateX(-4px);
      }

      .upload-btn:hover {
        background: var(--light-green);
        transform: translateX(4px);
      }

      .class-banner {
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--dark-green)
        );
        border-radius: 24px;
        padding: 1.5rem;
        color: white;
        margin-bottom: 1.5rem;
      }

      .class-banner h1 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }

      .class-banner .class-meta {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 0.5rem;
        font-size: 0.8rem;
        opacity: 0.9;
      }

      .stats-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .stat-card {
        background: var(--white);
        border-radius: 20px;
        padding: 1rem 1.5rem;
        flex: 1;
        min-width: 120px;
        box-shadow: var(--shadow);
      }

      .stat-number {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary-green);
      }

      .stat-label {
        font-size: 0.7rem;
        color: var(--medium-gray);
      }

      .card {
        background: var(--white);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
        border: 1px solid rgba(0, 100, 0, 0.1);
      }

      .card-header {
        background: var(--dark-green);
        color: white;
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .card-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .exam-badge {
        background: var(--accent-gold);
        color: var(--dark-green);
        padding: 0.25rem 0.75rem;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 600;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      .marks-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .marks-table th {
        background: var(--light-gray);
        color: var(--dark-gray);
        padding: 1rem;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid var(--light-green);
      }

      .marks-table td {
        padding: 1rem;
        border-bottom: 1px solid var(--light-gray);
        color: var(--dark-gray);
      }

      .marks-table tr:hover {
        background: var(--light-green);
      }

      .marks-input {
        width: 80px;
        padding: 0.4rem 0.5rem;
        border: 1.5px solid var(--light-gray);
        border-radius: 8px;
        font-size: 0.8rem;
        transition: var(--transition);
      }

      .marks-input:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 2px rgba(0, 100, 0, 0.1);
      }

      .total-cell {
        font-weight: 700;
        color: var(--primary-green);
      }

      .status-pass {
        color: var(--primary-green);
        font-weight: 600;
      }

      .status-fail {
        color: var(--danger);
        font-weight: 600;
      }

      .save-btn, .save-row-btn {
        background: var(--primary-green);
        color: white;
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 50px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
      }

      .save-row-btn {
        background: var(--secondary-green);
        padding: 0.3rem 0.8rem;
        font-size: 0.75rem;
      }

      .save-btn:hover, .save-row-btn:hover {
        background: var(--dark-green);
        transform: translateY(-2px);
      }

      .btn-group {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
        margin-top: 1rem;
      }

      .empty-row td {
        text-align: center;
        padding: 2rem;
        color: var(--medium-gray);
      }

      @media (max-width: 768px) {
        body {
          padding: 1rem;
        }
        .marks-table th,
        .marks-table td {
          padding: 0.5rem;
          font-size: 0.7rem;
        }
        .marks-input {
          width: 60px;
        }
        .save-row-btn {
          padding: 0.2rem 0.5rem;
          font-size: 0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <button class="back-btn" onclick="goBack()">← Back to Classes</button>
        <button class="upload-btn" onclick="window.location.href='fileupload.html'">Bulk Upload</button>
      </div>

      <div class="class-banner" id="classBanner">
        <h1>Loading class...</h1>
        <div class="class-meta"></div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number" id="totalStudents">0</div>
          <div class="stat-label">Total Students</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="avgCat">—</div>
          <div class="stat-label">Average CAT</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="avgExam">—</div>
          <div class="stat-label">Average Exam</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="avgTotal">—</div>
          <div class="stat-label">Average Total</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Unit ClassList</h2>
          <span class="exam-badge" id="examCategoryBadge">Exam Category</span>
        </div>
        <div class="table-wrapper">
          <table class="marks-table">
            <thead>
              <tr>
                <th>Student adm.no</th>
                <th>Student Name</th>
                <th>CAT Marks</th>
                <th>Exam Marks</th>
                <th>Total (out of 100)</th>
                <!-- <th>Status</th> -->
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="marksTableBody">
              <tr class="empty-row">
                <td colspan="7">Loading student data...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="btn-group">
          <button class="save-btn" onclick="saveAllMarks()">Save All Changes</button>
          <button class="save-btn" onclick="exportToCSV()">Export to CSV</button>
        </div>
      </div>
    </div>

    <script>
      let currentClass = null;
      let currentStudents = [];
      let currentUser = null;
      let examMeta = null;

      // Get current user from session
      async function getCurrentUser() {
        try {
          const response = await fetch("/api/current-user", {
            credentials: "include",
          });

          if (!response.ok) {
            throw new Error("Server error");
          }

          const data = await response.json();

          if (data.success && data.user) {
            currentUser = data.user;
            console.log("User loaded:", currentUser);
            return true;
          }

          // fallback to localStorage
          const pf = localStorage.getItem("userPfNo");
          const email = localStorage.getItem("userEmail");

          if (pf && email) {
            currentUser = { pf_no: pf, email: email };
            return true;
          }

          window.location.href = "login.html";
          return false;
        } catch (err) {
          console.error("Error getting user:", err);
          const pf = localStorage.getItem("userPfNo");
          const email = localStorage.getItem("userEmail");

          if (pf && email) {
            currentUser = { pf_no: pf, email: email };
            return true;
          }

          window.location.href = "login.html";
          return false;
        }
      }

      // Fetch student marks from API
      async function fetchStudentMarks() {
        try {
          const tbody = document.getElementById("marksTableBody");
          tbody.innerHTML =
            '<tr class="empty-row"><td colspan="7">Loading student marks...</tr>';

          const payload = {
            programme_code: currentClass.programmeCode,
            semester: currentClass.semester?.semester || currentClass.semester?.name,
            stage: currentClass.stage,
            unit_code: currentClass.unitCode,
            exam_category: currentClass.examCategory,
          };

          console.log("Sending marks request with payload:", payload);

          const response = await fetch("/api/marks", {
            method: "POST",
            credentials: "include",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Server error: ${response.status} - ${errorText}`);
          }

          const data = await response.json();
          console.log("Full API response:", data);

          if (data.class_list && Array.isArray(data.class_list)) {
            console.log("Found class_list with", data.class_list.length, "students");
            
            currentStudents = data.class_list.map((student) => ({
              student_no: student.student_no || student.adm_no,
              student_name: student.student_name || student.name,
              cat_marks: student.cat_mark || 0,
              exam_marks: student.exam_mark || 0,
              original_cat: student.cat_mark || 0,
              original_exam: student.exam_mark || 0,
            }));
            
            examMeta = data.exam_category;
            
            console.log("Mapped students:", currentStudents.length);
            renderMarksTable();
            updateClassBanner();
          } else {
            console.error("No class_list found in response. Response structure:", Object.keys(data));
            throw new Error(data.error || "No student data found in response");
          }
        } catch (err) {
          console.error("Error fetching marks:", err);
          document.getElementById("marksTableBody").innerHTML =
            `<tr class="empty-row"><td colspan="7">❌ Error: ${err.message}<br>
            <button onclick="location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--primary-green); color: white; border: none; border-radius: 8px; cursor: pointer;">Retry</button></tr>`;
        }
      }

      function calculateTotal(cat, exam) {
        if (examMeta) {
          const maxCat = examMeta.max_cat_mark || 30;
          const maxExam = examMeta.max_exam_mark || 70;
          const catContribution = (cat / maxCat) * (maxCat === 30 ? 30 : 40);
          const examContribution = (exam / maxExam) * (maxExam === 70 ? 70 : 60);
          return Math.min(100, Math.max(0, catContribution + examContribution));
        }
        return Math.min(100, (cat || 0) + (exam || 0));
      }

      // function getStatus(total) {
      //   if (total >= 70) return { text: "Pass (A)", class: "status-pass" };
      //   if (total >= 60) return { text: "Pass (B)", class: "status-pass" };
      //   if (total >= 50) return { text: "Pass (C)", class: "status-pass" };
      //   if (total >= 40) return { text: "Supplementary", class: "status-fail" };
      //   return { text: "Fail", class: "status-fail" };
      // }

      function getMaxMarks() {
        if (examMeta) {
          return {
            cat: examMeta.max_cat_mark || 30,
            exam: examMeta.max_exam_mark || 70,
          };
        }
        return { cat: 30, exam: 70 };
      }

      // Save a single student's marks - UPDATED to match backend
      async function saveSingleMarks(index) {
        const student = currentStudents[index];
        
        if (student.cat_marks === student.original_cat && student.exam_marks === student.original_exam) {
          alert("ℹ️ No changes to save for this student");
          return;
        }
        
        try {
          // Build payload matching backend expectations
          const payload = {
            unit_code: currentClass.unitCode,
            semester: currentClass.semester?.semester || currentClass.semester?.name,
            pf_no: currentUser.pf_no,
            programme_code: currentClass.programmeCode,
            stage: currentClass.stage,
            exam_category: currentClass.examCategory,
            student_no: student.student_no,
            cat_marks: student.cat_marks || 0,
            exam_marks: student.exam_marks || 0,
            academic_year: currentClass.academic_year || "2024/2025"
          };

          console.log("Saving single student marks:", payload);

          const response = await fetch("/api/marks/save", {
            method: "POST",
            credentials: "include",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (data.success) {
            student.original_cat = student.cat_marks;
            student.original_exam = student.exam_marks;
            alert(`✅ Marks saved successfully for ${student.student_name}!`);
            console.log("Saved marks response:", data);
          } else {
            throw new Error(data.error || "Failed to save marks");
          }
        } catch (err) {
          console.error("Error saving marks:", err);
          alert("❌ Error saving marks: " + err.message);
        }
      }

      // Save all marks - UPDATED to send individual requests
      async function saveAllMarks() {
        let savedCount = 0;
        let errorCount = 0;
        
        for (let i = 0; i < currentStudents.length; i++) {
          const student = currentStudents[i];
          
          // Only save if changes exist
          if (student.cat_marks !== student.original_cat || student.exam_marks !== student.original_exam) {
            try {
              const payload = {
                unit_code: currentClass.unitCode,
                semester: currentClass.semester?.semester || currentClass.semester?.name,
                pf_no: currentUser.pf_no,
                programme_code: currentClass.programmeCode,
                stage: currentClass.stage,
                exam_category: currentClass.examCategory,
                student_no: student.student_no,
                cat_marks: student.cat_marks || 0,
                exam_marks: student.exam_marks || 0,
                academic_year: currentClass.academic_year || "2024/2025"
              };

              const response = await fetch("/api/marks/save", {
                method: "POST",
                credentials: "include",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(payload),
              });

              const data = await response.json();

              if (data.success) {
                student.original_cat = student.cat_marks;
                student.original_exam = student.exam_marks;
                savedCount++;
              } else {
                errorCount++;
                console.error(`Failed to save ${student.student_name}:`, data.error);
              }
            } catch (err) {
              errorCount++;
              console.error(`Error saving ${student.student_name}:`, err);
            }
          }
        }
        
        if (savedCount > 0) {
          alert(`✅ ${savedCount} student(s) saved successfully!${errorCount > 0 ? `\n⚠️ ${errorCount} failed.` : ''}`);
        } else if (errorCount > 0) {
          alert(`❌ Failed to save ${errorCount} student(s).`);
        } else {
          alert("ℹ️ No changes to save.");
        }
        
        renderMarksTable(); // Re-render to update highlight indicators
      }

      function renderMarksTable() {
        if (!currentStudents || currentStudents.length === 0) {
          document.getElementById("marksTableBody").innerHTML =
            '<tr class="empty-row"><td colspan="7">No students found for this class.</tr>';
          document.getElementById("totalStudents").textContent = "0";
          document.getElementById("avgCat").textContent = "—";
          document.getElementById("avgExam").textContent = "—";
          document.getElementById("avgTotal").textContent = "—";
          return;
        }

        let totalCat = 0,
          totalExam = 0,
          totalFinal = 0;
        const maxMarks = getMaxMarks();

        const tbody = document.getElementById("marksTableBody");
        tbody.innerHTML = currentStudents
          .map((student, index) => {
            const cat = student.cat_marks || 0;
            const exam = student.exam_marks || 0;
            const finalTotal = calculateTotal(cat, exam);
            // const status = getStatus(finalTotal);
            totalCat += cat;
            totalExam += exam;
            totalFinal += finalTotal;
            
            const hasChanges = (cat !== student.original_cat) || (exam !== student.original_exam);
            const rowStyle = hasChanges ? 'style="background-color: rgba(255, 255, 0, 0.1);"' : '';

            return `
              <tr ${rowStyle}>
                <td><strong>${escapeHtml(student.student_no || "-")}</strong></td>
                <td>${escapeHtml(student.student_name || "-")}</td>
                <td><input type="number" class="marks-input" id="cat_${index}" value="${cat}" step="0.5" min="0" max="${maxMarks.cat}" onchange="updateMarks(${index}, 'cat', this.value)"></td>
                <td><input type="number" class="marks-input" id="exam_${index}" value="${exam}" step="0.5" min="0" max="${maxMarks.exam}" onchange="updateMarks(${index}, 'exam', this.value)"></td>
                <td class="total-cell" id="total_${index}">${finalTotal.toFixed(1)}</td>
                <!-- <td class="${status.class}">${status.text}</td> -->
                <td><button class="save-row-btn" onclick="saveSingleMarks(${index})">Save Row</button></td>
              </tr>
            `;
          })
          .join("");

        const count = currentStudents.length;
        document.getElementById("totalStudents").textContent = count;
        document.getElementById("avgCat").textContent = (totalCat / count).toFixed(1);
        document.getElementById("avgExam").textContent = (totalExam / count).toFixed(1);
        document.getElementById("avgTotal").textContent = (totalFinal / count).toFixed(1);
      }

      function updateMarks(index, type, value) {
        let numValue = parseFloat(value);
        if (isNaN(numValue)) numValue = 0;

        if (type === "cat") {
          currentStudents[index].cat_marks = numValue;
        } else {
          currentStudents[index].exam_marks = numValue;
        }

        const cat = currentStudents[index].cat_marks || 0;
        const exam = currentStudents[index].exam_marks || 0;
        const finalTotal = calculateTotal(cat, exam);
        document.getElementById(`total_${index}`).textContent = finalTotal.toFixed(1);

        // const status = getStatus(finalTotal);
        const row = document.getElementById(`total_${index}`).parentElement;
        const statusCell = row.cells[5];
        statusCell.className = status.class;
        statusCell.textContent = status.text;
        
        const hasChanges = (currentStudents[index].cat_marks !== currentStudents[index].original_cat) || 
                          (currentStudents[index].exam_marks !== currentStudents[index].original_exam);
        if (hasChanges) {
          row.style.backgroundColor = "rgba(255, 255, 0, 0.1)";
        } else {
          row.style.backgroundColor = "";
        }

        let totalCat = 0, totalExam = 0, totalFinal = 0;
        currentStudents.forEach((s) => {
          const c = s.cat_marks || 0;
          const e = s.exam_marks || 0;
          totalCat += c;
          totalExam += e;
          totalFinal += calculateTotal(c, e);
        });
        const count = currentStudents.length;
        document.getElementById("avgCat").textContent = (totalCat / count).toFixed(1);
        document.getElementById("avgExam").textContent = (totalExam / count).toFixed(1);
        document.getElementById("avgTotal").textContent = (totalFinal / count).toFixed(1);
      }

      function exportToCSV() {
        let csvContent = "Admission No.,Student Name,CAT Marks,Exam Marks,Total,Status\n";
        currentStudents.forEach((student) => {
          const cat = student.cat_marks || 0;
          const exam = student.exam_marks || 0;
          const finalTotal = calculateTotal(cat, exam);
          // const status = getStatus(finalTotal).text;,"${status}"
          csvContent += `"${student.student_no}","${student.student_name}",${cat},${exam},${finalTotal.toFixed(1)}\n`;
        });

        const blob = new Blob([csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `${currentClass.unitCode}_marks.csv`);
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      function updateClassBanner() {
        const unitName = currentClass.unitName || currentClass.unit_name || "sampleClass";
        const unitCode = currentClass.unitCode || "sampleUnit";
        const semesterName = currentClass.semester?.semester || currentClass.semester?.name || "sampleCurrent";
        const examCategory = currentClass.examCategory || "sampleDEGREE";

        let badgeText = examCategory;
        if (examMeta) {
          badgeText = `Marks Contribution : ${examMeta.category || examCategory} (${examMeta.max_cat_mark}:${examMeta.max_exam_mark})`;
        }

        document.getElementById("classBanner").innerHTML = `
          <h1>📖 ${escapeHtml(unitName)}</h1>
          <div class="class-meta">
            <span>📚 ${escapeHtml(unitCode)}</span>
            <span>📅 Semester: ${escapeHtml(semesterName)}</span>
            <span>🏫 ${escapeHtml(currentClass.programmeCode || "")} - ${escapeHtml(currentClass.stage || "")}</span>
          </div>
        `;
        
        document.getElementById("examCategoryBadge").textContent = badgeText;
      }

      function loadClassData() {
        const savedClass = localStorage.getItem("selectedClass");
        if (!savedClass) {
          window.location.href = "classes.html";
          return;
        }

        currentClass = JSON.parse(savedClass);
        console.log("Loaded class data:", currentClass);

        if (!currentClass.examCategory) {
          currentClass.examCategory = "DEGREE";
        }
        
        if (!currentClass.academic_year) {
          currentClass.academic_year = "2024/2025";
        }

        updateClassBanner();
      }

      function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function goBack() {
        window.location.href = "classes.html";
      }

      async function init() {
        console.log("=== MARKS PAGE INIT ===");
