<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.jpg">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Semesters | Lecturer Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
      }

      :root {
        --primary-green: #006400;
        --secondary-green: #228b22;
        --light-green: #f0f9f0;
        --dark-green: #004d00;
        --accent-gold: #d4af37;
        --white: #ffffff;
        --light-gray: #f8f9fa;
        --medium-gray: #6c757d;
        --dark-gray: #343a40;
        --transition: all 0.3s ease;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        --danger: #dc3545;
        --warning: #fd7e14;
        --info: #0dcaf0;
      }

      body {
        background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
        min-height: 100vh;
        padding: 2rem 1.5rem;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .top-bar {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .admin-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--white);
        border: none;
        padding: 0.6rem 1.2rem;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        color: var(--accent-gold);
        box-shadow: var(--shadow);
      }

      .admin-btn:hover {
        background: var(--accent-gold);
        color: var(--white);
        transform: translateY(-2px);
      }

      .logout-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--white);
        border: none;
        padding: 0.6rem 1.2rem;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        color: var(--danger);
        box-shadow: var(--shadow);
      }

      .logout-btn:hover {
        background: var(--danger);
        color: var(--white);
        transform: translateY(-2px);
      }

      .header {
        margin-bottom: 2rem;
        text-align: center;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--secondary-green)
        );
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
      }

      .header p {
        color: var(--medium-gray);
        margin-top: 0.5rem;
      }

      .card {
        background: var(--white);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
        margin-bottom: 1.5rem;
        transition: var(--transition);
        border: 1px solid rgba(0, 100, 0, 0.1);
      }

      .card-header {
        background: var(--dark-green);
        color: white;
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .card-header h2 {
        font-size: 1.25rem;
        font-weight: 600;
      }

      .semester-list {
        padding: 0;
      }

      .semester-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--light-gray);
        transition: var(--transition);
        cursor: pointer;
      }

      .semester-item:hover {
        background: var(--light-green);
      }

      .semester-item:last-child {
        border-bottom: none;
      }

      .semester-info {
        flex: 1;
      }

      .semester-name {
        font-weight: 600;
        color: var(--dark-green);
        font-size: 1rem;
        margin-bottom: 0.25rem;
      }

      .semester-dates {
        font-size: 0.75rem;
        color: var(--medium-gray);
      }

      .status-badge {
        padding: 0.25rem 0.75rem;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 600;
      }

      .status-open {
        background: var(--light-green);
        color: var(--primary-green);
      }

      .status-closed {
        background: #f8d7da;
        color: var(--danger);
      }

      .view-btn {
        background: var(--primary-green);
        color: white;
        border: none;
        padding: 0.4rem 1rem;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        margin-left: 1rem;
      }

      .view-btn:hover {
        background: var(--dark-green);
        transform: translateY(-2px);
      }

      .stats-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .stat-card {
        background: var(--white);
        border-radius: 20px;
        padding: 1rem 1.5rem;
        flex: 1;
        min-width: 150px;
        box-shadow: var(--shadow);
        text-align: center;
      }

      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary-green);
      }

      .stat-label {
        font-size: 0.75rem;
        color: var(--medium-gray);
        margin-top: 0.25rem;
      }

      .lecturer-info {
        background: var(--light-green);
        border-radius: 20px;
        padding: 1rem 1.5rem;
        margin-bottom: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .lecturer-name {
        font-weight: 600;
        color: var(--dark-green);
        font-size: 1.1rem;
      }

      .lecturer-dept {
        font-size: 0.8rem;
        color: var(--medium-gray);
      }

      .loading-spinner {
        text-align: center;
        padding: 2rem;
      }

      .fa-spin {
        animation: fa-spin 2s infinite linear;
      }

      @keyframes fa-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @media (max-width: 700px) {
        body {
          padding: 1rem;
        }
        .semester-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.5rem;
        }
        .view-btn {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1><i class="fas fa-chalkboard-user"></i> My Semesters</h1>
        <p>A list of all the Semesters I have taught in</p>
        <div class="top-bar" id="actionButtons">
          <!-- Admin button will be dynamically inserted here if user is admin -->
          <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>

      <div class="lecturer-info" id="lecturerInfo">
        <div>
          <div class="lecturer-name" id="lecturerName">
            <i class="fas fa-spinner fa-spin"></i> Loading...
          </div>
        </div>
        <div class="stats-row" style="margin-bottom: 0; gap: 0.5rem">
          <div class="stat-card" style="padding: 0.5rem 1rem; min-width: auto">
            <div class="stat-number" id="totalSemesters">0</div>
            <div class="stat-label">Total Semesters</div>
          </div>
          <div class="stat-card" style="padding: 0.5rem 1rem; min-width: auto">
            <div class="stat-number" id="activeSemesters">0</div>
            <div class="stat-label">Active</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-calendar-alt"></i> Academic Semesters</h2>
          <span
            class="status-badge status-open"
            style="background: var(--light-green)"
            >Click any semester to view classes</span
          >
        </div>
        <div class="semester-list" id="semesterList">
          <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Loading semesters...
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentUser = null;
      let userRole = null;

      // Get current user from session
      async function getCurrentUser() {
        try {
          const response = await fetch("/api/current-user", {
            credentials: "include",
          });

          if (!response.ok) {
            throw new Error("Not authenticated");
          }

          const data = await response.json();

          if (data.success && data.user) {
            currentUser = data.user;
            console.log("User loaded:", currentUser);
            
            // Store in localStorage for other pages
            localStorage.setItem("userEmail", currentUser.email);
            localStorage.setItem("userPfNo", currentUser.pf_no);
            localStorage.setItem("userName", currentUser.full_name || currentUser.email);
            
            return true;
          }
          
          // Fallback to localStorage if session fails
          const email = localStorage.getItem("userEmail");
          const pf = localStorage.getItem("userPfNo");
          
          if (email && pf) {
            currentUser = { email: email, pf_no: pf };
            return true;
          }
          
          window.location.href = "login.html";
          return false;
        } catch (err) {
          console.error("Error getting user:", err);
          const email = localStorage.getItem("userEmail");
          const pf = localStorage.getItem("userPfNo");
          
          if (email && pf) {
            currentUser = { email: email, pf_no: pf };
            return true;
          }
          
          window.location.href = "login.html";
          return false;
        }
      }

      // Fetch user role from backend
      async function fetchUserRole(email) {
        try {
          const response = await fetch(`/api/user-role/${encodeURIComponent(email)}`, {
            method: "GET",
            credentials: "include",
          });

          if (response.ok) {
            const data = await response.json();
            if (data.success) {
              userRole = data.role;
              localStorage.setItem("userRole", userRole);
              return userRole;
            }
          }
          return null;
        } catch (error) {
          console.error("Error fetching user role:", error);
          return null;
        }
      }

      // Show/hide admin button based on role
      async function updateAdminButton() {
        const userEmail = currentUser?.email;
        if (!userEmail) return;

        const role = await fetchUserRole(userEmail);
        const topBar = document.getElementById("actionButtons");
        
        if (role === "admin") {
          // Create admin button if it doesn't exist
          if (!document.getElementById("adminBtn")) {
            const adminBtn = document.createElement("button");
            adminBtn.id = "adminBtn";
            adminBtn.className = "admin-btn";
            adminBtn.innerHTML = '<i class="fas fa-crown"></i> Admin Panel';
            adminBtn.onclick = () => {
              window.location.href = "admin.html";
            };
            // Insert admin button before logout button
            topBar.insertBefore(adminBtn, topBar.firstChild);
          }
        } else {
          // Remove admin button if it exists
          const existingAdminBtn = document.getElementById("adminBtn");
          if (existingAdminBtn) {
            existingAdminBtn.remove();
          }
        }
      }

      // Update lecturer info display
      function updateLecturerInfo() {
        if (currentUser) {
          const nameElement = document.getElementById("lecturerName");
          const deptElement = document.getElementById("lecturerDept");
          
          // Display email and PF number
          nameElement.innerHTML = `<i class="fas fa-envelope"></i> ${currentUser.email}<br>
                                    <small style="font-size: 0.8rem;"><i class="fas fa-id-card"></i> ${currentUser.pf_no}</small>`;
        }
      }

      // Fetch semesters from your backend
      async function fetchSemesters() {
        try {
          const container = document.getElementById("semesterList");
          container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading semesters...</div>';

          const response = await fetch(
            `/api/semesters?email=${encodeURIComponent(currentUser.email)}&pf_no=${encodeURIComponent(currentUser.pf_no)}`,
            {
              credentials: "include",
            }
          );

          if (!response.ok) {
            throw new Error("Failed to fetch semesters");
          }

          const data = await response.json();

          if (data.success && data.semesters) {
            renderSemesters(data.semesters);
            updateStats(data.semesters);
          } else {
            throw new Error(data.error || "No data received");
          }
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("semesterList").innerHTML = `
            <div style="padding: 2rem; text-align: center; color: var(--danger);">
              <i class="fas fa-exclamation-triangle"></i> ❌ Failed to load semesters: ${error.message}<br>
              <button onclick="fetchSemesters()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--primary-green); color: white; border: none; border-radius: 8px; cursor: pointer;">
                <i class="fas fa-sync-alt"></i> Retry
              </button>
            </div>
          `;
        }
      }

      function renderSemesters(semesters) {
        const container = document.getElementById("semesterList");

        if (!semesters || semesters.length === 0) {
          container.innerHTML = `
            <div style="padding: 2rem; text-align: center; color: var(--medium-gray);">
              <i class="fas fa-folder-open"></i> No semesters found for this lecturer
            </div>
          `;
          return;
        }

        container.innerHTML = semesters
          .map((semester, index) => {
            let status = "closed";
            let statusText = "● Semester Closed";

            if (semester.is_current === 1) {
              status = "open";
              statusText = "● Semester Active";
            } else if (
              semester.marks_entry_date &&
              semester.marks_entry_date !== "1753-01-01T00:00:00"
            ) {
              const entryDate = new Date(semester.marks_entry_date);
              const today = new Date();
              if (entryDate > today) {
                status = "open";
                statusText = "● Marks Entry Open";
              }
            }

            const [startYear, endYear] = semester.academic_year.split("/");
            const startDate = `${semester.semester.includes("1") ? "Sep" : "Jan"} ${startYear}`;
            const endDate = `${semester.semester.includes("1") ? "Dec" : "Apr"} ${endYear || startYear}`;

            return `
              <div class="semester-item" onclick='selectSemester(${JSON.stringify(semester)})'>
                <div class="semester-info">
                  <div class="semester-name">
                    <i class="fas fa-graduation-cap"></i> ${escapeHtml(semester.semester)} (${escapeHtml(semester.academic_year)})
                  </div>
                  <div class="semester-dates">
                    <i class="fas fa-calendar-week"></i> ${startDate} - ${endDate}
                  </div>
                </div>
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                  <span class="status-badge ${status === "open" ? "status-open" : "status-closed"}">
                    ${statusText}
                  </span>
                  <button class="view-btn">
                    <i class="fas fa-eye"></i> View Classes →
                  </button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function updateStats(semesters) {
        const total = semesters.length;
        const active = semesters.filter((s) => s.is_current === 1).length;

        document.getElementById("totalSemesters").textContent = total;
        document.getElementById("activeSemesters").textContent = active;
      }

      function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function selectSemester(semester) {
        console.log("Selected semester:", semester);
        localStorage.setItem(
          "selectedSemester",
          JSON.stringify({
            semester: semester.semester,
            academic_year: semester.academic_year,
            is_current: semester.is_current,
            marks_entry_date: semester.marks_entry_date,
            lecturer: semester.lecturer,
          }),
        );
        window.location.href = "classes.html";
      }

      // Logout function
      async function logout() {
        try {
          const response = await fetch("/api/logout", {
            method: "POST",
            credentials: "include",
          });

          localStorage.removeItem("userEmail");
          localStorage.removeItem("userPfNo");
          localStorage.removeItem("userName");
          localStorage.removeItem("userRole");
          localStorage.removeItem("selectedSemester");
          localStorage.removeItem("selectedClass");

          window.location.href = "index.html";
        } catch (error) {
          console.error("Logout error:", error);
          localStorage.clear();
          window.location.href = "index.html";
        }
      }

      // Initialize page
      async function init() {
        console.log("=== SEMESTERS PAGE INIT ===");
        
        const userLoaded = await getCurrentUser();
        if (!userLoaded) return;
        
        updateLecturerInfo();
        await updateAdminButton();
        await fetchSemesters();
      }

      // Start the initialization
      init();
    </script>
  </body>
</html>
