<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.jpg">
    <title>Login | Marks Management System</title>
    <style>
      /* Your existing styles remain the same */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
      }

      :root {
        --primary-green: #006400;
        --secondary-green: #228b22;
        --light-green: #f0f9f0;
        --dark-green: #004d00;
        --accent-gold: #d4af37;
        --white: #ffffff;
        --light-gray: #f8f9fa;
        --medium-gray: #6c757d;
        --dark-gray: #343a40;
        --transition: all 0.3s ease;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        --danger: #dc3545;
        --success: #28a745;
      }

      body {
        background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem 1.5rem;
      }

      .login-container {
        max-width: 450px;
        width: 100%;
        background: var(--white);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .imgcontainer {
        text-align: center;
        padding: 2rem 2rem 1rem 2rem;
        background: linear-gradient(135deg, var(--light-green), var(--white));
      }

      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #d4af37;
        padding: 8px;
        background: var(--white);
      }

      h2 {
        text-align: center;
        color: #004d00;
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0;
        padding: 0 2rem;
      }

      .login-form {
        padding: 2rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-weight: 600;
        color: #004d00;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }

      input[type="text"],
      input[type="password"],
      input[type="email"] {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      input[type="text"]:focus,
      input[type="password"]:focus,
      input[type="email"]:focus {
        outline: none;
        border-color: #006400;
        box-shadow: 0 0 0 3px rgba(0, 100, 0, 0.1);
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 1.5rem 0;
      }

      .checkbox-group input {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #006400;
      }

      .checkbox-group label {
        margin: 0;
        cursor: pointer;
        font-weight: normal;
      }

      button[type="submit"] {
        width: 100%;
        background: #006400;
        color: white;
        padding: 0.8rem;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 1rem;
      }

      button[type="submit"]:hover {
        background: #004d00;
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }

      .action-buttons {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #e0e0e0;
      }

      .psw {
        font-size: 0.9rem;
      }

      .psw a {
        color: #006400;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
      }

      .psw a:hover {
        color: #d4af37;
        text-decoration: underline;
      }

      .error-message {
        background: #f8d7da;
        color: #dc3545;
        padding: 0.75rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        text-align: center;
      }

      .success-message {
        background: #d4edda;
        color: #155724;
        padding: 0.75rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        text-align: center;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5);
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .modal-content {
        background-color: var(--white);
        margin: 5% auto;
        padding: 0;
        border-radius: 28px;
        width: 90%;
        max-width: 450px;
        box-shadow: var(--shadow);
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          transform: translateY(-50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
        color: white;
        padding: 1.5rem;
        border-radius: 28px 28px 0 0;
      }

      .modal-header h3 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }

      .modal-header p {
        font-size: 0.85rem;
        opacity: 0.9;
      }

      .modal-body {
        padding: 1.5rem;
      }

      .modal-footer {
        padding: 1rem 1.5rem 1.5rem;
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
      }

      .btn-modal {
        padding: 0.6rem 1.2rem;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        border: none;
      }

      .btn-primary-modal {
        background: var(--primary-green);
        color: white;
      }

      .btn-primary-modal:hover {
        background: var(--dark-green);
        transform: translateY(-2px);
      }

      .btn-secondary-modal {
        background: var(--light-gray);
        color: var(--dark-gray);
      }

      .btn-secondary-modal:hover {
        background: var(--medium-gray);
        color: white;
        transform: translateY(-2px);
      }

      .close {
        float: right;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
        color: white;
        opacity: 0.8;
        transition: opacity 0.3s ease;
      }

      .close:hover {
        opacity: 1;
      }

      .reset-step {
        display: none;
      }

      .reset-step.active {
        display: block;
      }

      @media (max-width: 480px) {
        .login-container {
          margin: 1rem;
        }
        .login-form {
          padding: 1.5rem;
        }
        h2 {
          font-size: 1.5rem;
        }
        .action-buttons {
          flex-direction: column;
          gap: 1rem;
        }
        .modal-content {
          margin: 10% auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="imgcontainer">
        <img
          src="security.png"
          alt="Avatar"
          class="avatar"
          onerror="this.style.display = 'none'"
        />
      </div>

      <h2>Welcome Back</h2>

      <form action="/login" method="post" class="login-form" id="loginForm">
        <div class="form-group">
          <label for="uname">Email</label>
          <input
            type="text"
            placeholder="Enter Email"
            name="uname"
            id="uname"
            required
          />
        </div>

        <div class="form-group">
          <label for="pf">PF Number</label>
          <input
            type="text"
            placeholder="Enter PF Number"
            name="pf"
            id="pf"
            required
          />
        </div>

        <div class="form-group">
          <label for="psw">Password</label>
          <input
            type="password"
            placeholder="Enter Password"
            name="psw"
            id="psw"
            required
          />
        </div>

        <div class="checkbox-group">
          <input
            type="checkbox"
            checked="checked"
            name="remember"
            id="remember"
          />
          <label for="remember">Remember me</label>
        </div>

        <button type="submit">Login</button>

        <div class="action-buttons">
          <span class="psw"><a href="register.html">Sign Up?</a></span>
          <span class="psw"><a href="#" id="forgotPasswordLink">Forgot Password?</a></span>
        </div>
      </form>
    </div>

    <!-- Forgot Password Modal -->
    <div id="resetModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <span class="close" id="closeModalBtn">&times;</span>
          <h3>Reset Password</h3>
          <p>We'll help you create a new password</p>
        </div>
        
        <div class="modal-body">
          <div id="step1" class="reset-step active">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
            </div>
            <div class="form-group">
              <label>PF Number</label>
              <input type="text" id="resetPfNumber" placeholder="Enter your PF Number" required>
            </div>
            <div id="step1Message"></div>
          </div>
          
          <div id="step2" class="reset-step">
            <div class="form-group">
              <label>Reset Token</label>
              <input type="text" id="resetToken" placeholder="Enter the reset token from your email" required>
            </div>
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="newPassword" placeholder="Enter new password (min. 6 characters)" required>
            </div>
            <div class="form-group">
              <label>Confirm New Password</label>
              <input type="password" id="confirmPassword" placeholder="Confirm your new password" required>
            </div>
            <div id="step2Message"></div>
          </div>
        </div>
        
        <div class="modal-footer">
          <button class="btn-modal btn-secondary-modal" id="cancelResetBtn">Cancel</button>
          <button class="btn-modal btn-primary-modal" id="nextStepBtn">Next</button>
          <button class="btn-modal btn-primary-modal" id="resetPasswordBtn" style="display: none;">Reset Password</button>
          <button class="btn-modal btn-secondary-modal" id="backStepBtn" style="display: none;">Back</button>
        </div>
      </div>
    </div>

    <script>
      let resetRequestData = null;
      let currentStep = 1;
      
      const modal = document.getElementById('resetModal');
      const forgotPasswordLink = document.getElementById('forgotPasswordLink');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const cancelResetBtn = document.getElementById('cancelResetBtn');
      const nextStepBtn = document.getElementById('nextStepBtn');
      const backStepBtn = document.getElementById('backStepBtn');
      const resetPasswordBtn = document.getElementById('resetPasswordBtn');
      
      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');
      
      const resetEmail = document.getElementById('resetEmail');
      const resetPfNumber = document.getElementById('resetPfNumber');
      const resetToken = document.getElementById('resetToken');
      const newPassword = document.getElementById('newPassword');
      const confirmPassword = document.getElementById('confirmPassword');
      
      const step1Message = document.getElementById('step1Message');
      const step2Message = document.getElementById('step2Message');
      
      forgotPasswordLink.addEventListener('click', (e) => {
        e.preventDefault();
        modal.style.display = 'block';
        resetForm();
      });
      
      function closeModal() {
        modal.style.display = 'none';
        resetForm();
        showStep(1);
      }
      
      closeModalBtn.addEventListener('click', closeModal);
      cancelResetBtn.addEventListener('click', closeModal);
      
      window.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });
      
      function resetForm() {
        resetEmail.value = '';
        resetPfNumber.value = '';
        resetToken.value = '';
        newPassword.value = '';
        confirmPassword.value = '';
        step1Message.innerHTML = '';
        step2Message.innerHTML = '';
        resetRequestData = null;
      }
      
      function showStep(step) {
        currentStep = step;
        
        if (step === 1) {
          step1.classList.add('active');
          step2.classList.remove('active');
          nextStepBtn.style.display = 'block';
          resetPasswordBtn.style.display = 'none';
          backStepBtn.style.display = 'none';
        } else {
          step1.classList.remove('active');
          step2.classList.add('active');
          nextStepBtn.style.display = 'none';
          resetPasswordBtn.style.display = 'block';
          backStepBtn.style.display = 'block';
        }
      }
      
      async function requestPasswordReset() {
        const email = resetEmail.value.trim();
        const pfNumber = resetPfNumber.value.trim();
        
        if (!email || !pfNumber) {
          step1Message.innerHTML = '<div class="error-message">Please enter both email and PF number</div>';
          return;
        }
        
        try {
          const response = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              email: email,
              pf_number: pfNumber
            })
          });
          
          const data = await response.json();
          
          if (data.success) {
            step1Message.innerHTML = `<div class="success-message">
              ✅ ${data.message}<br>
              <strong>Token:</strong> ${data.resetToken}<br>
            </div>`;
            
            if (data.resetToken) {
              resetToken.value = data.resetToken;
            }
            
            setTimeout(() => {
              showStep(2);
            }, 2000);
          } else {
            step1Message.innerHTML = `<div class="error-message">❌ ${data.error}</div>`;
          }
        } catch (error) {
          console.error('Error:', error);
          step1Message.innerHTML = '<div class="error-message">❌ Network error. Please try again.</div>';
        }
      }
      
      async function resetPassword() {
        const token = resetToken.value.trim();
        const newPwd = newPassword.value;
        const confirmPwd = confirmPassword.value;
        
        if (!token) {
          step2Message.innerHTML = '<div class="error-message">Please enter the reset token</div>';
          return;
        }
        
        if (!newPwd || !confirmPwd) {
          step2Message.innerHTML = '<div class="error-message">Please enter and confirm your new password</div>';
          return;
        }
        
        if (newPwd !== confirmPwd) {
          step2Message.innerHTML = '<div class="error-message">Passwords do not match</div>';
          return;
        }
        
        if (newPwd.length < 6) {
          step2Message.innerHTML = '<div class="error-message">Password must be at least 6 characters long</div>';
          return;
        }
        
        try {
          const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              resetToken: token,
              newPassword: newPwd,
              confirmPassword: confirmPwd
            })
          });
          
          const data = await response.json();
          
          if (data.success) {
            step2Message.innerHTML = `<div class="success-message">✅ ${data.message}</div>`;
            
            setTimeout(() => {
              closeModal();
              alert('Password reset successful! Please login with your new password.');
            }, 2000);
          } else {
            step2Message.innerHTML = `<div class="error-message">❌ ${data.error}</div>`;
          }
        } catch (error) {
          console.error('Error:', error);
          step2Message.innerHTML = '<div class="error-message">❌ Network error. Please try again.</div>';
        }
      }
      
      nextStepBtn.addEventListener('click', requestPasswordReset);
      resetPasswordBtn.addEventListener('click', resetPassword);
      backStepBtn.addEventListener('click', () => showStep(1));
      
      resetEmail.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') requestPasswordReset();
      });
      resetPfNumber.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') requestPasswordReset();
      });
      resetToken.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') resetPassword();
      });
      newPassword.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') resetPassword();
      });
      confirmPassword.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') resetPassword();
      });

      const urlParams = new URLSearchParams(window.location.search);
      const error = urlParams.get("error");
      if (error) {
        const errorDiv = document.createElement("div");
        errorDiv.className = "error-message";
        errorDiv.textContent = decodeURIComponent(error);
        const form = document.querySelector(".login-form");
        form.insertBefore(errorDiv, form.firstChild);
      }
    </script>
  </body>
</html>
