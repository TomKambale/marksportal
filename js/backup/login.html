<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.jpg">
    <title>Login | Marks Management System</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
      }

      :root {
        --primary-green: #006400;
        --secondary-green: #228b22;
        --light-green: #f0f9f0;
        --dark-green: #004d00;
        --accent-gold: #d4af37;
        --white: #ffffff;
        --light-gray: #f8f9fa;
        --medium-gray: #6c757d;
        --dark-gray: #343a40;
        --transition: all 0.3s ease;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        --danger: #dc3545;
      }

      body {
        background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem 1.5rem;
      }

      .login-container {
        max-width: 450px;
        width: 100%;
        background: var(--white);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .imgcontainer {
        text-align: center;
        padding: 2rem 2rem 1rem 2rem;
        background: linear-gradient(135deg, var(--light-green), var(--white));
      }

      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #d4af37;
        padding: 8px;
        background: var(--white);
      }

      h2 {
        text-align: center;
        color: #004d00;
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0;
        padding: 0 2rem;
      }

      .login-form {
        padding: 2rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-weight: 600;
        color: #004d00;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      input[type="text"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #006400;
        box-shadow: 0 0 0 3px rgba(0, 100, 0, 0.1);
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 1.5rem 0;
      }

      .checkbox-group input {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #006400;
      }

      .checkbox-group label {
        margin: 0;
        cursor: pointer;
        font-weight: normal;
      }

      button[type="submit"] {
        width: 100%;
        background: #006400;
        color: white;
        padding: 0.8rem;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 1rem;
      }

      button[type="submit"]:hover {
        background: #004d00;
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }

      .action-buttons {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #e0e0e0;
      }

      .cancelbtn {
        background: #f8f9fa;
        color: #343a40;
        padding: 0.7rem 1.5rem;
        border: none;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .cancelbtn:hover {
        background: #6c757d;
        color: white;
        transform: translateY(-2px);
      }

      .psw {
        font-size: 0.9rem;
      }

      .psw a {
        color: #006400;
        text-decoration: none;
        font-weight: 600;
      }

      .psw a:hover {
        color: #d4af37;
        text-decoration: underline;
      }

      .error-message {
        background: #f8d7da;
        color: #dc3545;
        padding: 0.75rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        text-align: center;
      }

      @media (max-width: 480px) {
        .login-container {
          margin: 1rem;
        }

        .login-form {
          padding: 1.5rem;
        }

        h2 {
          font-size: 1.5rem;
        }

        .action-buttons {
          flex-direction: column;
          gap: 1rem;
        }

        .cancelbtn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="imgcontainer">
        <img
          src="security.png"
          alt="Avatar"
          class="avatar"
          onerror="this.style.display = 'none'"
        />
      </div>

      <h2>Welcome Back</h2>

      <form action="/login" method="post" class="login-form">
        <div class="form-group">
          <label for="uname">Email</label>
          <input
            type="text"
            placeholder="Enter Email"
            name="uname"
            id="uname"
            required
          />
        </div>

        <div class="form-group">
          <label for="pf">PF Number</label>
          <input
            type="text"
            placeholder="Enter PF Number"
            name="pf"
            id="pf"
            required
          />
        </div>

        <div class="form-group">
          <label for="psw">Password</label>
          <input
            type="password"
            placeholder="Enter Password"
            name="psw"
            id="psw"
            required
          />
        </div>

        <div class="checkbox-group">
          <input
            type="checkbox"
            checked="checked"
            name="remember"
            id="remember"
          />
          <label for="remember">Remember me</label>
        </div>

        <button type="submit">Login</button>

        <div class="action-buttons">
          <!-- <button type="button" class="cancelbtn" onclick="resetForm()">
            Cancel
          </button> -->
          <span class="psw"><a href="register.html">SignUp?</a></span>
          <span class="psw">Forgot <a href="#">password?</a></span>
        </div>
      </form>
    </div>

    <script>
      function resetForm() {
        document.getElementById("uname").value = "";
        document.getElementById("pf").value = "";
        document.getElementById("psw").value = "";
        document.getElementById("remember").checked = true;
      }

      // Display error message if redirected back with error
      const urlParams = new URLSearchParams(window.location.search);
      const error = urlParams.get("error");
      if (error) {
        const errorDiv = document.createElement("div");
        errorDiv.className = "error-message";
        errorDiv.textContent = decodeURIComponent(error);
        const form = document.querySelector(".login-form");
        form.insertBefore(errorDiv, form.firstChild);
      }
    </script>
  </body>
</html>
