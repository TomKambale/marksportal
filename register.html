<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register | Marks Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        :root {
            --primary-green: #006400;
            --secondary-green: #228B22;
            --light-green: #f0f9f0;
            --dark-green: #004d00;
            --accent-gold: #D4AF37;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --medium-gray: #6c757d;
            --dark-gray: #343a40;
            --transition: all 0.3s ease;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --danger: #dc3545;
            --warning: #fd7e14;
            --info: #0dcaf0;
        }

        body {
            background: linear-gradient(135deg, #eef5e8 0%, #d9e8d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .register-container {
            max-width: 500px;
            width: 100%;
            background: var(--white);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
        }

        .header {
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            padding: 2rem;
            text-align: center;
        }

        .header h2 {
            color: var(--white);
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .register-form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--dark-green);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="pfnumber"],
        input[type="Name"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--white);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(0, 100, 0, 0.1);
        }

        input:hover {
            border-color: var(--secondary-green);
        }

        button[type="submit"] {
            width: 100%;
            background: var(--primary-green);
            color: var(--white);
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        button[type="submit"]:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e0e0e0;
        }

        .login-link a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .login-link a:hover {
            color: var(--accent-gold);
            text-decoration: underline;
        }

        .login-link p {
            color: var(--medium-gray);
            font-size: 0.9rem;
        }

        .password-hint {
            font-size: 0.75rem;
            color: var(--medium-gray);
            margin-top: 0.25rem;
        }

        @media (max-width: 480px) {
            .register-container {
                margin: 1rem;
            }
            
            .register-form {
                padding: 1.5rem;
            }
            
            .header {
                padding: 1.5rem;
            }
            
            .header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="header">
            <h2>Create Account</h2>
            <p>Join the Marks Management System</p>
        </div>
        
        <form action="/register.js" method="post" class="register-form">
            <div class="form-group">
                <label for="uname">Email Address</label>
                <input type="email" placeholder="Enter Email" name="uname" id="uname" required>
            </div>

            <div class="form-group">
                <label for="pf">PF Number</label>
                <input type="text" placeholder="Enter PF Number" name="pf" id="pf" required>
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" placeholder="Enter Full Name" name="name" id="name" required>
            </div>

            <div class="form-group">
                <label for="psw">Password</label>
                <input type="password" placeholder="Create Password" name="psw" id="psw" required>
                <div class="password-hint">Password must be at least 8 characters</div>
            </div>
            
            <button type="submit">Register</button>
            
            <div class="login-link">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </form>
    </div>
</body>
</html>
