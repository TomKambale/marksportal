<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTU Marks System - Test Data Console</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .test-section {
            background: #252526;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .test-header {
            background: #2d2d2d;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 1px solid #3e3e42;
        }
        
        .test-content {
            padding: 20px;
            display: none;
        }
        
        .test-content.active {
            display: block;
        }
        
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #1177bb;
        }
        
        pre {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            margin: 10px 0;
        }
        
        .success {
            color: #6a9955;
        }
        
        .error {
            color: #f48771;
        }
        
        .warning {
            color: #dcdcaa;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .badge-active { background: #6a9955; color: white; }
        .badge-inactive { background: #f48771; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 TTU Marks System - Test Data Console</h1>
            <p>Quick test scenarios to verify system functionality</p>
        </div>
        
        <div class="test-section">
            <div class="test-header" onclick="toggleSection(this)">
                📚 1. Lecturer Data Test
            </div>
            <div class="test-content">
                <button onclick="testLecturers()">Load Lecturer Data</button>
                <div id="lecturer-results"></div>
            </div>
        </div>
        
        <div class="test-section">
            <div class="test-header" onclick="toggleSection(this)">
                📅 2. Academic Data Test
            </div>
            <div class="test-content">
                <button onclick="testSemesters()">Load Semesters</button>
                <button onclick="testStages()">Load Stages</button>
                <button onclick="testProgrammes()">Load Programmes</button>
                <div id="academic-results"></div>
            </div>
        </div>
        
        <div class="test-section">
            <div class="test-header" onclick="toggleSection(this)">
                👥 3. Student Data Test
            </div>
            <div class="test-content">
                <button onclick="testStudents()">Load Students</button>
                <button onclick="testInvalidStudents()">Test Invalid Registrations</button>
                <div id="student-results"></div>
            </div>
        </div>
        
        <div class="test-section">
            <div class="test-header" onclick="toggleSection(this)">
                📊 4. Marks Data Test
            </div>
            <div class="test-content">
                <button onclick="testValidMarks()">Valid Marks</button>
                <button onclick="testEdgeCaseMarks()">Edge Cases</button>
                <button onclick="testInvalidMarks()">Invalid Marks</button>
                <div id="marks-results"></div>
            </div>
        </div>
        
        <div class="test-section">
            <div class="test-header" onclick="toggleSection(this)">
                🔄 5. Bulk Upload Test
            </div>
            <div class="test-content">
                <input type="file" id="upload-file" accept=".csv">
                <button onclick="testBulkUpload()">Test Upload</button>
                <div id="upload-results"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:3000/api';
        const token = sessionStorage.getItem('ttu_token');
        
        function toggleSection(header) {
            const content = header.nextElementSibling;
            content.classList.toggle('active');
        }
        
        async function testLecturers() {
            const results = document.getElementById('lecturer-results');
            results.innerHTML = '<pre>Loading...</pre>';
            
            try {
                const response = await fetch(`${API_BASE}/lecturers/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                results.innerHTML = `
                    <pre class="success">
✅ Lecturer Data Loaded Successfully

${JSON.stringify(data, null, 2)}
                    </pre>
                `;
            } catch (error) {
                results.innerHTML = `<pre class="error">❌ Error: ${error.message}</pre>`;
            }
        }
        
        async function testSemesters() {
            const results = document.getElementById('academic-results');
            results.innerHTML = '<pre>Loading...</pre>';
            
            try {
                const response = await fetch(`${API_BASE}/academics/semesters`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                results.innerHTML = `
                    <pre class="success">
✅ Semesters Loaded Successfully

Total Semesters: ${data.length}

${JSON.stringify(data, null, 2)}
                    </pre>
                `;
            } catch (error) {
                results.innerHTML = `<pre class="error">❌ Error: ${error.message}</pre>`;
            }
        }
        
        async function testStages() {
            const results = document.getElementById('academic-results');
            results.innerHTML = '<pre>Loading...</pre>';
            
            try {
                const response = await fetch(`${API_BASE}/academics/stages?semesterId=SEM-2025-1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const active = data.filter(s => s.status === 'Active');
                const inactive = data.filter(s => s.status === 'Inactive');
                
                results.innerHTML = `
                    <pre class="success">
✅ Stages Loaded Successfully

Total Stages: ${data.length}
🟢 Active: ${active.length}
🔴 Inactive: ${inactive.length}

${JSON.stringify(data, null, 2)}
                    </pre>
                `;
            } catch (error) {
                results.innerHTML = `<pre class="error">❌ Error: ${error.message}</pre>`;
            }
        }
        
        async function testProgrammes() {
            const results = document.getElementById('academic-results');
            results.innerHTML = '<pre>Loading...</pre>';
            
            try {
                const response = await fetch(`${API_BASE}/academics/programmes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                results.innerHTML = `
                    <pre class="success">
✅ Programmes Loaded Successfully

Total Programmes: ${data.length}

${JSON.stringify(data, null, 2)}
                    </pre>
                `;
            } catch (error) {
                results.innerHTML = `<pre class="error">❌ Error: ${error.message}</pre>`;
            }
        }
        
        async function testStudents() {
            const results = document.getElementById('student-results');
            results.innerHTML = '<pre>Loading...</pre>';
            
            try {
                const response = await fetch(`${API_BASE}/students?unitCode=CSC101&semesterId=SEM-2025-1&stageId=Y3S1&programmeId=BSC-CS`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                results.innerHTML = `
                    <pre class="success">
✅ Students Loaded Successfully

Total Students: ${data.length}

Sample (first 5):
${JSON.stringify(data.slice(0, 5), null, 2)}
                    </pre>
                `;
            } catch (error) {
                results.innerHTML = `<pre class="error">❌ Error: ${error.message}</pre>`;
            }
        }
        
        function testInvalidStudents() {
            const results = document.getElementById('student-results');
            results.innerHTML = `
                <pre class="warning">
⚠️ Invalid Registration Numbers to Test:

1. TTU/2021/99999 - Non-existent student
2. INVALID123 - Wrong format
3. TTU-2022-001 - Wrong format
4. 2021/00001 - Missing prefix
5. TTU/2021/00001/EXTRA - Extra characters

These should be rejected by validation.
                </pre>
            `;
        }
        
        function testValidMarks() {
            const results = document.getElementById('marks-results');
            results.innerHTML = `
                <pre class="success">
✅ Valid Marks Test Cases:

Normal Range:
- CAT: 25/30, Exam: 60/70 → Total: 85/100 ✓
- CAT: 30/30, Exam: 70/70 → Total: 100/100 ✓
- CAT: 0/30, Exam: 0/70 → Total: 0/100 ✓
- CAT: 15/30, Exam: 35/70 → Total: 50/100 ✓
- CAT: 22.5/30, Exam: 64.5/70 → Total: 87/100 ✓

All these should pass validation.
                </pre>
            `;
        }
        
        function testEdgeCaseMarks() {
            const results = document.getElementById('marks-results');
            results.innerHTML = `
                <pre class="warning">
⚠️ Edge Case Test Cases:

Boundary Values:
- CAT: 30.0/30, Exam: 70.0/70 → Exactly at max ✓
- CAT: 29.9/30, Exam: 69.9/70 → Slightly under max ✓
- CAT: 0.1/30, Exam: 0.1/70 → Very small positive ✓

Special Cases:
- CAT: null, Exam: 60 → Missing CAT ✗
- CAT: 25, Exam: null → Missing Exam ✗
- CAT: "", Exam: 60 → Empty string ✗
- CAT: "abc", Exam: 60 → Non-numeric ✗

These test boundary and special case handling.
                </pre>
            `;
        }
        
        function testInvalidMarks() {
            const results = document.getElementById('marks-results');
            results.innerHTML = `
                <pre class="error">
❌ Invalid Marks Test Cases:

Exceeding Limits:
- CAT: 35/30, Exam: 65/70 → CAT exceeds max ✗
- CAT: 25/30, Exam: 75/70 → Exam exceeds max ✗
- CAT: 30/30, Exam: 71/70 → Exam exceeds max ✗

Negative Values:
- CAT: -5/30, Exam: 60/70 → Negative marks ✗
- CAT: 25/30, Exam: -10/70 → Negative marks ✗

Impossible Totals:
- CAT: 30/30, Exam: 70/70 → Total: 100 ✓ (max)
- CAT: 30/30, Exam: 71/70 → Total: 101 ✗ (impossible)
- CAT: 25/30, Exam: 80/70 → Total: 105 ✗ (impossible)

All these should be rejected by validation.
                </pre>
            `;
        }
        
        function testBulkUpload() {
            const fileInput = document.getElementById('upload-file');
            const results = document.getElementById('upload-results');
            
            if (!fileInput.files.length) {
                results.innerHTML = '<pre class="warning">⚠️ Please select a CSV file first</pre>';
                return;
            }
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const content = e.target.result;
                const lines = content.split('\n');
                
                results.innerHTML = `
                    <pre class="success">
✅ File Analysis Complete

File: ${file.name}
Size: ${(file.size / 1024).toFixed(2)} KB
Rows: ${lines.length - 1}

First 5 rows:
${lines.slice(0, 5).join('\n')}

Validation Results:
- Header Check: ${lines[0].includes('RegNo,UnitCode,CAT,Exam') ? '✓ Pass' : '✗ Fail'}
- Data Rows: ${lines.length - 1} rows to process
                    </pre>
                `;
            };
            
            reader.readAsText(file);
        }
        
        // Display login status
        if (!token) {
            document.querySelector('.header').innerHTML += `
                <div class="error">
                    ⚠️ Not logged in! Please login first from the main page.
                </div>
            `;
        } else {
            document.querySelector('.header').innerHTML += `
                <div class="success">
                    ✅ Logged in successfully. Token: ${token.substring(0, 30)}...
                </div>
            `;
        }
    </script>
</body>
</html>
